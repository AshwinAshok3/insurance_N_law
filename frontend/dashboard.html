<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Nexustice AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            overflow: hidden; /* Prevent body scroll, layout handles it */
        }
        .dashboard-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            background: rgba(10, 14, 23, 0.8);
            border-right: 1px solid var(--border-glass);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .menu-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            margin-top: 1rem;
        }
        .menu-item {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: var(--transition);
            cursor: pointer;
        }
        .menu-item:hover, .menu-item.active {
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent-primary);
        }
        .user-profile {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
        }
        .avatar {
            width: 36px;
            height: 36px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        /* Workspace */
        .workspace {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }
        .topbar {
            height: 70px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background: rgba(18, 24, 38, 0.5);
            backdrop-filter: blur(10px);
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .message {
            display: flex;
            gap: 1rem;
            max-width: 80%;
        }
        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }
        .message-bubble {
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            line-height: 1.6;
        }
        .message.user .message-bubble {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
            border-top-right-radius: 4px;
        }
        .message.ai .message-bubble {
            border-top-left-radius: 4px;
        }
        
        /* Input Area */
        .input-area {
            padding: 1.5rem 2rem;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-glass);
        }
        .chat-form {
            display: flex;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 0.5rem;
            align-items: flex-end;
        }
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            resize: none;
            min-height: 24px;
            max-height: 150px;
            font-family: inherit;
        }
        .chat-input:focus {
            outline: none;
        }
        .send-btn {
            background: var(--accent-primary);
            color: white;
            border-radius: var(--radius-md);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .send-btn:hover {
            background: var(--accent-secondary);
        }
        
        /* Markdown Styling inside AI bubble */
        .message.ai .message-bubble h1, 
        .message.ai .message-bubble h2, 
        .message.ai .message-bubble h3 {
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            color: var(--accent-secondary);
        }
        .message.ai .message-bubble p {
            margin-bottom: 0.75rem;
        }
        .message.ai .message-bubble ul {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- LEFT PANEL -->
        <aside class="sidebar">
            <div class="nav-brand">
                <i class="fa-solid fa-scale-balanced text-gradient"></i> Nexustice AI
            </div>
            
            <div class="sidebar-menu">
                <div class="menu-title">Modules</div>
                <div class="menu-item active" id="nav-law" onclick="switchDomain('law')">
                    <i class="fa-solid fa-gavel"></i> Legal Assistant
                </div>
                <div class="menu-item" id="nav-banks" onclick="switchDomain('banks')">
                    <i class="fa-solid fa-building-columns"></i> Bank Insurance
                </div>
                <div class="menu-item" id="nav-irdai" onclick="switchDomain('irdai')">
                    <i class="fa-solid fa-clipboard-check"></i> IRDAI Compliance
                </div>
                
                <div class="menu-title">DPI Engine</div>
                <div class="menu-item" id="nav-aa" onclick="switchDomain('aa')">
                    <i class="fa-solid fa-mobile-retro"></i> AA Consent Sandbox
                </div>
                <div class="menu-item" id="nav-heatmap" onclick="switchDomain('heatmap')">
                    <i class="fa-solid fa-map-location-dot"></i> Regulatory Heatmap
                </div>
                
                <div class="menu-title">Tools</div>
                <a href="upload.html" class="menu-item">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Document Ingestion
                </a>
                <div class="menu-item" onclick="loadHistory()">
                    <i class="fa-solid fa-clock-rotate-left"></i> Query History
                </div>
            </div>
            
            <div class="user-profile">
                <div class="avatar" id="user-avatar">U</div>
                <div style="flex: 1;">
                    <div style="font-weight: 500; font-size: 0.9rem;" id="user-name">Guest</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">Admin</div>
                </div>
                <i class="fa-solid fa-right-from-bracket" style="cursor: pointer; padding: 0.5rem;" onclick="logout()"></i>
            </div>
        </aside>
        
        <!-- MAIN WORKSPACE -->
        <main class="workspace">
            <div class="topbar">
                <div id="active-domain-title" style="font-weight: 600; font-size: 1.1rem;">
                    <i class="fa-solid fa-gavel text-gradient"></i> Legal Reference Assistant
                </div>
                <div>
                    <span style="font-size: 0.8rem; background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 0.25rem 0.5rem; border-radius: 4px; border: 1px solid rgba(16, 185, 129, 0.2);">
                        System Healthy
                    </span>
                </div>
            </div>
            
            <div class="chat-container" id="chat-container">
                <div class="message ai animate-fade-in">
                    <div class="avatar" style="background: var(--bg-secondary); border: 1px solid var(--border-glass);"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-bubble">
                        Hello! I am your AI compliance and legal assistant. How can I help you today?
                    </div>
                </div>
            </div>
            
            <div class="input-area" id="input-area">
                <form class="chat-form" id="chat-form">
                    <textarea class="chat-input" id="chat-input" placeholder="Type your query regarding law, bank policies, or IRDAI rules..." rows="1"></textarea>
                    <button type="submit" class="send-btn" id="send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
