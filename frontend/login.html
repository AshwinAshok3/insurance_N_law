<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexustice AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h2 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--accent-primary);
            font-weight: 500;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-glass);
        }
        .auth-divider:not(:empty)::before {
            margin-right: .5em;
        }
        .auth-divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>
<body>
    <div class="container auth-container animate-fade-in">
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <div class="nav-brand" style="justify-content: center; margin-bottom: 1rem;">
                    <i class="fa-solid fa-scale-balanced text-gradient"></i> Nexustice AI
                </div>
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Enter your credentials to access the system</p>
            </div>
            
            <div id="alert-box" class="alert hidden"></div>

            <form id="auth-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="input-field" placeholder="Enter username" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="submit-btn">
                    Login
                </button>
            </form>
            
            <div class="auth-divider">OR</div>
            
            <button id="guest-btn" class="btn btn-outline" style="width: 100%;">
               Continue as Guest
            </button>
            
            <div class="auth-footer">
                <span id="auth-switch-text">Don't have an account?</span> 
                <a href="#" id="auth-switch-link">Register here</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
